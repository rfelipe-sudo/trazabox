name: trazabox
description: "TrazaBox - Gestión de alertas de fibra óptica para TRAZA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # Firebase para notificaciones push (descomentar cuando tengas google-services.json)
  # firebase_core: ^3.8.1
  # firebase_messaging: ^15.2.0
  
  # Notificaciones locales con sonido custom
  flutter_local_notifications: ^18.0.1
  
  # Audio para reproducir respuestas del agente
  just_audio: ^0.9.42
  
  # Permisos (micrófono, cámara, ubicación)
  permission_handler: ^11.3.1
  
  # HTTP para comunicación con API Kepler
  http: ^1.2.2
  dio: ^5.7.0
  
  # Estado de la app
  provider: ^6.1.2
  
  # Almacenamiento local
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Procesamiento de imágenes
  image: ^4.1.3
  
  # Cámara para fotos georeferenciadas
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  
  # Geolocalización
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Google Maps
  google_maps_flutter: ^2.9.0
  google_maps_flutter_platform_interface: ^2.9.0
  
  # URL Launcher para abrir mapas
  url_launcher: ^6.3.1
  
  # UUID para identificadores únicos
  uuid: ^4.5.1
  
  # Info del dispositivo (Android ID)
  device_info_plus: ^11.2.1
  
  # Formateo de fechas
  intl: ^0.20.1
  
  # Iconos adicionales
  flutter_vector_icons: ^2.0.0
  
  # Animaciones
  flutter_animate: ^4.5.2
  
  # Grabación de audio
  record: ^6.0.0
  
  # WebSocket para comunicación en tiempo real
  web_socket_channel: ^3.0.1
  
  # Mantener pantalla encendida
  wakelock_plus: ^1.2.1
  
  # Sistema Anti-Fraude "Sin Moradores"
  flutter_activity_recognition: ^3.0.0
  pedometer_2: ^5.0.4
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  
  # Paquete compartido para Tester de Red v2 (Mapa de Calor)
  tester_red_shared:
    path: ../tester_red_shared
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # Firma digital para transferencias
  signature: ^5.4.0
  
  # Splash Screen animado
  flutter_spinkit: ^5.2.1

  # Fuentes Google (Bebas Neue, JetBrains Mono, Space Grotesk)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  
  # Generador de iconos para todas las plataformas
  flutter_launcher_icons: ^0.14.2
  
  # Generador de splash screen nativo
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/images/
    - assets/icons/
    - assets/logo/

# ══════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE ICONO DE LA APP
# ══════════════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/app_icon.png"
  adaptive_icon_background: "assets/logo/app_icon.png"
  adaptive_icon_foreground: "assets/logo/app_icon.png"
  min_sdk_android: 21

# ══════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE SPLASH SCREEN (Pantalla de carga)
# ══════════════════════════════════════════════════════════════════════════
flutter_native_splash:
  color: "#050810"
  android: true
  ios: false
  android_12:
    color: "#050810"
  fullscreen: true
